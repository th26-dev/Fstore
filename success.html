<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thanh toán thành công</title>
    <link rel="stylesheet" href="./assets/css/style.css">
    <style>
        .success-box { text-align: center; margin-top: 150px; }
        .success-box i { font-size: 80px; color: #34c759; margin-bottom: 20px; }
        .btn-home { display: inline-block; margin-top: 30px; padding: 12px 25px; background: #0071e3; color: #fff; border-radius: 20px; text-decoration: none; }
    </style>
</head>
<body>
    <div class="success-box">
        <i class="fa-solid fa-circle-check"></i>
        <h1>Cảm ơn bạn đã đặt hàng!</h1>
        <p>Giao dịch của bạn đã được xử lý thành công qua MoMo.</p>
        <a href="index.html" class="btn-home" id="clearCart">Quay về trang chủ</a>
    </div>

    <script type="module">
        import { auth } from './models/firebaseConfig.js';
        document.getElementById('clearCart').addEventListener('click', () => {
            const user = auth.currentUser;
            if(user) localStorage.removeItem(`cart_${user.uid}`);
        });
    </script>
</body>
</html>
