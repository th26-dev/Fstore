<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tài khoản - Apple Store</title>
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="stylesheet" href="./assets/css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <a href="index.html" class="back-home"><i class="fa-brands fa-apple"></i></a>

        <div class="auth-box" id="loginBox">
            <h2>Đăng nhập</h2>
            <form id="loginForm">
                <input type="email" id="loginEmail" placeholder="Email" required>
                <input type="password" id="loginPassword" placeholder="Mật khẩu" required>
                <button type="submit" class="btn-auth">Tiếp tục</button>
            </form>
            <p id="loginError" class="error-msg"></p>
            <p class="switch-auth">Chưa có ID Apple? <span id="toRegister">Tạo mới ngay</span></p>
        </div>

        <div class="auth-box" id="registerBox" style="display: none;">
            <h2>Tạo ID Apple</h2>
            <form id="registerForm">
                <input type="text" id="regName" placeholder="Họ và tên" required>
                <input type="email" id="regEmail" placeholder="Email" required>
                <input type="password" id="regPassword" placeholder="Mật khẩu" required>
                <button type="submit" class="btn-auth">Gửi mã xác nhận</button>
            </form>
            <div id="otpSection" style="display: none; margin-top: 20px;">
                <p style="font-size: 14px; color: #86868b; margin-bottom: 10px;">Vui lòng kiểm tra mã OTP trong email.</p>
                <input type="text" id="otpInput" placeholder="Nhập mã OTP">
                <button class="btn-auth" id="btnVerifyOtp">Xác nhận đăng ký</button>
            </div>
            <p id="regError" class="error-msg"></p>
            <p class="switch-auth">Đã có ID Apple? <span id="toLogin">Đăng nhập</span></p>
        </div>
    </div>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="module" src="./controllers/authController.js"></script>
</body>
</html>
